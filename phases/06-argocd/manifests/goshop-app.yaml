apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goshop
  namespace: argocd
  finalizers:
    # Khi xóa Application, ArgoCD cũng xóa resource k8s đã apply.
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/quangdangfit/deployment
    targetRevision: main
    path: phases/05-helm/chart/goshop
    helm:
      valueFiles:
        - values.yaml
        # Bỏ comment dòng dưới khi muốn deploy với prod overlay:
        # - values-prod.yaml
      # Inline override (vì image tag chưa cố định trong chart):
      parameters:
        - name: image.repository
          value: ghcr.io/quangdangfit/goshop
        - name: image.tag
          value: phase5
  destination:
    server: https://kubernetes.default.svc
    namespace: goshop
  syncPolicy:
    automated:
      prune: true       # xóa resource khỏi cluster khi xóa khỏi git
      selfHeal: true    # tự sync khi cluster drift (vd ai đó kubectl edit tay)
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
