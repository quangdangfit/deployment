# Application với annotation cho ArgoCD Image Updater theo dõi 2 image.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goshop
  namespace: argocd
  annotations:
    # 2 alias: "api" + "web", mỗi cái 1 image
    argocd-image-updater.argoproj.io/image-list: |
      api=ghcr.io/quangdangfit/goshop,
      web=ghcr.io/quangdangfit/goshop-web
    # Strategy chung
    argocd-image-updater.argoproj.io/api.update-strategy: newest-build
    argocd-image-updater.argoproj.io/web.update-strategy: newest-build
    # Regex: chỉ chấp nhận tag CI master (master-a1b2c3d)
    argocd-image-updater.argoproj.io/api.allow-tags: regexp:^master-[0-9a-f]{7}$
    argocd-image-updater.argoproj.io/web.allow-tags: regexp:^master-[0-9a-f]{7}$
    # Helm parameter path để image-updater biết viết tag vào key nào của values.yaml
    argocd-image-updater.argoproj.io/api.helm.image-tag: api.image.tag
    argocd-image-updater.argoproj.io/api.helm.image-name: api.image.repository
    argocd-image-updater.argoproj.io/web.helm.image-tag: web.image.tag
    argocd-image-updater.argoproj.io/web.helm.image-name: web.image.repository
    # Write tag mới vào git
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: helmvalues:./values.yaml
    argocd-image-updater.argoproj.io/git-branch: main
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/quangdangfit/deployment
    targetRevision: main
    path: phases/05-helm/chart/goshop
    helm:
      valueFiles:
        - values.yaml
      # KHÔNG set image tag ở đây — Image Updater quản trong values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
