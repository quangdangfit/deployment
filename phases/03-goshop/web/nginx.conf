# FE nginx — serve SPA + proxy /api → BE service nội bộ cluster.
server {
    listen 80;
    server_name _;

    # SPA: mọi route không match file → trả về index.html (cho React Router)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* sang BE service.
    # Tên DNS: <service>.<namespace>.svc.cluster.local; cùng ns dùng tên ngắn được.
    # goshop-api = tên Service ClusterIP của BE (đặt ở 30-api-service.yaml).
    location /api/ {
        proxy_pass http://goshop-api:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Endpoint /health của BE (Phase 4 ingress test) — proxy thẳng.
    location /health {
        proxy_pass http://goshop-api:8888/health;
    }

    # Swagger UI từ BE — tiện debug.
    location /swagger/ {
        proxy_pass http://goshop-api:8888/swagger/;
    }
}
