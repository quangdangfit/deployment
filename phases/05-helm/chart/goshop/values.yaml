# Prod-only values.

api:
  replicaCount: 2
  image:
    repository: ghcr.io/quangdangfit/goshop
    tag: ""            # empty → fallback Chart.appVersion
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

web:
  replicaCount: 2
  image:
    repository: ghcr.io/quangdangfit/goshop-web
    tag: ""            # empty → fallback Chart.appVersion
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits:   { cpu: 200m, memory: 128Mi }

service:
  api:
    type: ClusterIP    # BE nội bộ — FE proxy /api → BE
    httpPort: 8888
    grpcPort: 8889
  web:
    type: ClusterIP    # ingress trỏ thẳng vào đây; KHÔNG cần NodePort khi đã có ingress
    port: 80

ingress:
  enabled: true
  className: nginx
  clusterIssuer: letsencrypt-prod
  host: goshop.cunghoclaptrinh.online
  tlsSecretName: goshop-tls

# Config app cho BE. Phase 7 tách secrets sang ExternalSecret.
config:
  environment: production
  authSecret: change-me-prod-strong-secret
  database:
    uri: postgres://goshop:goshop_dev@postgres.data:5432/goshop?sslmode=disable
  redis:
    uri: redis.data:6379
    password: redis_dev
    db: 0
  cors:
    allowedOrigins: "*"
  rateLimit:
    requests: 100
    windowSeconds: 60
  stripe:
    secretKey: sk_test_dummy
    webhookSecret: whsec_dummy
    publishableKey: pk_test_dummy
  smtp:
    host: ""
    port: 25
    user: ""
    password: ""
    emailFrom: no-reply@goshop.local
