apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "goshop.fullname" . }}-config
  labels: {{- include "goshop.labels" . | nindent 4 }}
data:
  config.yaml: |
    environment: {{ .Values.config.environment }}
    http_port: {{ .Values.service.httpPort }}
    grpc_port: {{ .Values.service.grpcPort }}
    auth_secret: {{ .Values.config.authSecret | quote }}

    database_uri: {{ .Values.config.database.uri | quote }}

    redis_uri: {{ .Values.config.redis.uri | quote }}
    redis_password: {{ .Values.config.redis.password | quote }}
    redis_db: {{ .Values.config.redis.db }}

    cors_allowed_origins: {{ .Values.config.cors.allowedOrigins | quote }}
    rate_limit_requests: {{ .Values.config.rateLimit.requests }}
    rate_limit_window_seconds: {{ .Values.config.rateLimit.windowSeconds }}

    stripe_secret_key: {{ .Values.config.stripe.secretKey | quote }}
    stripe_webhook_secret: {{ .Values.config.stripe.webhookSecret | quote }}
    stripe_publishable_key: {{ .Values.config.stripe.publishableKey | quote }}
    stripe_api_base:

    smtp_host: {{ .Values.config.smtp.host | quote }}
    smtp_port: {{ .Values.config.smtp.port }}
    smtp_user: {{ .Values.config.smtp.user | quote }}
    smtp_password: {{ .Values.config.smtp.password | quote }}
    email_from: {{ .Values.config.smtp.emailFrom | quote }}
