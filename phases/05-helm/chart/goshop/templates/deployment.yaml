apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "goshop.fullname" . }}
  labels: {{- include "goshop.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "goshop.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "goshop.selectorLabels" . | nindent 8 }}
      annotations:
        # Khi ConfigMap đổi, annotation này đổi → pod rolling restart tự động.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: goshop
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          env:
            - name: CONFIG_FILE
              value: /app/config.yaml
          resources: {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: {{ include "goshop.fullname" . }}-config
