apiVersion: v1
kind: Service
metadata:
  name: {{ include "goshop.fullname" . }}
  labels: {{- include "goshop.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "goshop.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
