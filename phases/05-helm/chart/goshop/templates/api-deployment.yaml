apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "goshop.api.fullname" . }}
  labels: {{- include "goshop.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels: {{- include "goshop.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "goshop.api.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.api.httpPort }}
            - name: grpc
              containerPort: {{ .Values.service.api.grpcPort }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          env:
            - name: CONFIG_FILE
              value: /app/config.yaml
          envFrom:
            - secretRef:
                name: goshop-secrets    # Doppler → ESO: auth_secret, stripe_*, smtp_*, database_uri, redis_uri, redis_password
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: {{ include "goshop.api.fullname" . }}-config
