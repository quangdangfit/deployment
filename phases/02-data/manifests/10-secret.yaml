# Hardcoded credentials cho môi trường học/dev.
# Phase 7 sẽ thay bằng ExternalSecret + Doppler — tuyệt đối không commit secret prod vào git.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: data
type: Opaque
stringData:
  POSTGRES_USER: goshop
  POSTGRES_PASSWORD: goshop_dev
  POSTGRES_DB: goshop
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: data
type: Opaque
stringData:
  REDIS_PASSWORD: redis_dev
