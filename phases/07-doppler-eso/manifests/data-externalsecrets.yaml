apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: data
spec:
  refreshInterval: 1h     # ESO re-sync mỗi giờ
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: postgres-credentials   # Secret sinh ra sẽ có tên này (override Phase 2)
    creationPolicy: Owner        # ESO làm "owner" — xóa ExternalSecret = xóa Secret
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: POSTGRES_USER       # nếu Doppler không có, đặt giá trị mặc định trong Doppler
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: POSTGRES_PASSWORD
    - secretKey: POSTGRES_DB
      remoteRef:
        key: POSTGRES_DB
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: REDIS_PASSWORD
