# HPA cho BE — thường chịu tải CPU nhiều hơn FE nginx
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: goshop-api
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: goshop-api    # tên do helm chart sinh = "<release>-api"
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource: { name: cpu,    target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies: [{ type: Percent, value: 50, periodSeconds: 60 }]
    scaleUp:
      stabilizationWindowSeconds: 0
      policies: [{ type: Percent, value: 100, periodSeconds: 30 }]
---
# HPA cho FE — scale theo CPU (nginx serving static, ngưỡng cao hơn)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: goshop-web
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: goshop-web
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 80 } }
