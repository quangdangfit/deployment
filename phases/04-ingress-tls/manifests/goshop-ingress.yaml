apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goshop
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Redirect HTTP → HTTPS tự động ở ingress-nginx.
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [goshop.cunghoclaptrinh.online]
      # cert-manager sẽ tạo Secret này với cert + key.
      secretName: goshop-tls
  rules:
    - host: goshop.cunghoclaptrinh.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # FE service ở Phase 3. FE nginx tự proxy /api → goshop-api nội bộ.
                name: goshop-web
                port:
                  number: 80
