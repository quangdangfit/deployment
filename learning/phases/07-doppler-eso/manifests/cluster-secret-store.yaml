apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: doppler
spec:
  provider:
    doppler:
      auth:
        secretRef:
          # Secret này phải được tạo trước (Step 3 trong README) — bootstrap problem:
          # ESO không thể tự sync token để auth chính nó.
          dopplerToken:
            name: doppler-token
            namespace: external-secrets
            key: dopplerToken
