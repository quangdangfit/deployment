# Cần thêm các keys sau vào Doppler:
#   S3_ACCESS_KEY, S3_SECRET_KEY, S3_ENDPOINT (vd https://<account>.r2.cloudflarestorage.com), S3_BUCKET
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: s3-backup-creds
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: s3-backup-creds
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef: { key: S3_ACCESS_KEY }
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef: { key: S3_SECRET_KEY }
    - secretKey: S3_ENDPOINT
      remoteRef: { key: S3_ENDPOINT }
    - secretKey: S3_BUCKET
      remoteRef: { key: S3_BUCKET }
