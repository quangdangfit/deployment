# PRE-REQUIREMENT: CNI hỗ trợ NetworkPolicy (k3s flannel mặc định KHÔNG hỗ trợ).
---
# Cho phép Postgres nhận từ pod component=api (BE)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-from-api
  namespace: data
spec:
  podSelector:
    matchLabels: { app: postgres }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: default }
          podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports: [{ protocol: TCP, port: 5432 }]
---
# Tương tự Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-from-api
  namespace: data
spec:
  podSelector:
    matchLabels: { app: redis }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: default }
          podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports: [{ protocol: TCP, port: 6379 }]
---
# BE chỉ nhận traffic từ FE pod (web → api), không nhận trực tiếp từ internet
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-allow-from-web
  namespace: default
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/component: api }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app.kubernetes.io/component: web }
      ports: [{ protocol: TCP, port: 8888 }]
