apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goshop
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/quangdangfit/deployment
    targetRevision: main
    path: learning/phases/05-helm/chart/goshop
    helm:
      valueFiles:
        - values.yaml
      # Tag cố định "master" — Phase 8 (Image Updater) sẽ tự bump.
      parameters:
        - name: api.image.tag
          value: master
        - name: web.image.tag
          value: master
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
