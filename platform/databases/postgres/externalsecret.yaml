apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef: {key: POSTGRES_USER}
    - secretKey: POSTGRES_PASSWORD
      remoteRef: {key: POSTGRES_PASSWORD}
    - secretKey: POSTGRES_DB
      remoteRef: {key: POSTGRES_DB}
