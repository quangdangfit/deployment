apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: snapnews-secrets
  namespace: snapnews
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler
    kind: ClusterSecretStore
  target:
    name: snapnews-secrets
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef: {key: ANTHROPIC_API_KEY}
