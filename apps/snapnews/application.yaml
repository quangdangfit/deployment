apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snapnews
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/quangdangfit/deployment
      targetRevision: main
      path: charts/webapp
      helm:
        releaseName: snapnews
        valueFiles:
          - $values/apps/snapnews/values.yaml
    - repoURL: https://github.com/quangdangfit/deployment
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  # ImageUpdater CR (rendered by chart) lives in ns argocd, not destination ns.
  # Cho phép Argo manage resource ngoài destination namespace.
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      managedFieldsManagers:
        - external-secrets
