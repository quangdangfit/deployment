# Goshop prod values. Chart: charts/goshop. Tag auto-bumped by argocd-image-updater.
api:
  replicaCount: 2
  image:
    repository: ghcr.io/quangdangfit/goshop
    tag: "master-b700ec1"
    pullPolicy: Always
  resources:
    requests: {cpu: 100m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}
web:
  replicaCount: 2
  image:
    repository: ghcr.io/quangdangfit/goshop-web
    tag: "master-b700ec1"
    pullPolicy: Always
  resources:
    requests: {cpu: 10m, memory: 32Mi}
    limits: {cpu: 200m, memory: 128Mi}
service:
  api:
    type: ClusterIP
    httpPort: 8888
    grpcPort: 8889
  web:
    type: ClusterIP
    port: 80
ingress:
  enabled: true
  className: nginx
  clusterIssuer: letsencrypt-prod
  host: goshop.cunghoclaptrinh.online
  tlsSecretName: goshop-tls
config:
  environment: production
  redis: {db: 0}
  cors: {allowedOrigins: "*"}
  rateLimit: {requests: 100, windowSeconds: 60}
  smtp:
    host: ""
    port: 25
    emailFrom: no-reply@goshop.local

imageUpdater:
  enabled: true
  allowTags: "regexp:^master-[0-9a-f]{7}$"
  valuesPath: /apps/goshop/values.yaml
