apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: goshop
  namespace: argocd
spec:
  description: Goshop workload + supporting Bitnami charts
  sourceRepos:
    - https://github.com/quangdangfit/deployment
    - https://charts.bitnami.com/bitnami
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
