global:
  domain: argocd.cunghoclaptrinh.online
configs:
  params:
    server.insecure: "true"            # TLS terminated at ingress-nginx
controller:
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
server:
  replicas: 1
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.cunghoclaptrinh.online
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/backend-protocol: HTTP
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    tls: true
repoServer:
  replicas: 1
applicationSet:
  replicas: 1
redis:
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }
dex:
  enabled: false
notifications:
  enabled: false
