controller:
  kind: DaemonSet
  hostNetwork: true
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443
  dnsPolicy: ClusterFirstWithHostNet
  service:
    enabled: false
  ingressClassResource:
    default: true
  config:
    use-forwarded-headers: "true"
    proxy-body-size: "16m"
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  admissionWebhooks:
    enabled: true
