image:
  repository: ghcr.io/quangdangfit/goshop
  # tag/digest set per environment; rewritten in-place by ArgoCD Image Updater
  tag: master
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 2

env: prod
domain: goshop.quangdang.dev

service:
  ports:
    http: 8888
    grpc: 8889

ingress:
  className: nginx
  clusterIssuer: letsencrypt-prod
  http:
    enabled: true
    host: api.goshop.quangdang.dev
  grpc:
    enabled: true
    host: grpc.goshop.quangdang.dev

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 256Mi }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

probes:
  liveness:
    path: /health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    path: /ready
    port: http
    initialDelaySeconds: 3
    periodSeconds: 10

securityContext:
  pod:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile: { type: RuntimeDefault }
  container:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
  port: http

externalSecret:
  enabled: true
  refreshInterval: 1h
  storeRef:
    name: doppler
    kind: ClusterSecretStore
  dopplerProject: goshop
  dopplerEnvironment: prod
  # keys to sync from Doppler -> Kubernetes Secret
  keys:
    - DATABASE_URI
    - REDIS_URI
    - AUTH_SECRET
    - JWT_SECRET
    - OTEL_EXPORTER_OTLP_ENDPOINT

migration:
  enabled: true
  command: ["/goshop", "--migrate-only"]   # adjust if app uses different flag

config:
  # Rendered into ConfigMap as config.yaml. Sensitive values come from Secret env vars.
  http:
    port: 8888
  grpc:
    port: 8889
  log:
    level: info
    format: json

networkPolicy:
  enabled: true

observability:
  otel:
    enabled: true
    serviceName: goshop
    # OTEL_EXPORTER_OTLP_ENDPOINT comes from Doppler/Secret

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: goshop
          topologyKey: kubernetes.io/hostname
