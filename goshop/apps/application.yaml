apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goshop
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/quangdangfit/goshop
    argocd-image-updater.argoproj.io/app.update-strategy: digest
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^master$
    argocd-image-updater.argoproj.io/app.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: helmvalues:/goshop/charts/goshop/values-prod.yaml
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: goshop
  source:
    repoURL: https://github.com/quangdangfit/deployment
    targetRevision: main
    path: goshop/charts/goshop
    helm:
      releaseName: goshop
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: goshop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
