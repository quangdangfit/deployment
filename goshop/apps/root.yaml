# Goshop App-of-Apps. Apply this once after the platform root is healthy:
#   kubectl apply -f goshop/apps/root.yaml
# It then manages every other Application in goshop/apps/ via Git.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goshop-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: goshop
  source:
    repoURL: https://github.com/quangdangfit/deployment
    targetRevision: main
    path: goshop/apps
    directory:
      recurse: false
      exclude: 'root.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
