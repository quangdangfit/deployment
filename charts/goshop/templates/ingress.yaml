{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  labels: {{- include "goshop.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts: [{{ .Values.ingress.host }}]
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # /api/* → BE. PHẢI đặt trước path / (ingress-nginx match prefix dài hơn trước,
          # nhưng để rõ ràng vẫn list trên trước).
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "goshop.api.fullname" . }}
                port:
                  number: {{ .Values.service.api.httpPort }}
          # Còn lại → FE (SPA static).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "goshop.web.fullname" . }}
                port:
                  number: {{ .Values.service.web.port }}
{{- end }}
