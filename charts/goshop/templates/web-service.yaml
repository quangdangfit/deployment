apiVersion: v1
kind: Service
metadata:
  name: {{ include "goshop.web.fullname" . }}
  labels: {{- include "goshop.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  selector: {{- include "goshop.web.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.web.port }}
      targetPort: http
