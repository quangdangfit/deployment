replicaCount: 1

image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

containerPort: 80

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: nginx
  host: ""
  tlsSecretName: ""
  clusterIssuer: letsencrypt-prod

env: {}        # KEY: value pairs → injected as env vars
envFromSecret: ""   # optional Secret name to envFrom

resources:
  requests: {cpu: 10m, memory: 32Mi}
  limits: {cpu: 200m, memory: 128Mi}

# Optional persistent volume (for SQLite, file cache, etc).
# Enables strategy: Recreate so the single PVC isn't double-mounted on rollout.
persistence:
  enabled: false
  size: 1Gi
  mountPath: /data
  storageClassName: ""   # "" = default StorageClass (local-path on k3s)
